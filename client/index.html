    <!-- Script para remover "Made with Manus" -->
    <script>
      (function() {
        const removeElement = () => {
          const divs = document.querySelectorAll('div');
          divs.forEach(div => {
            if (div.textContent && div.textContent.includes('Made with Manus')) {
              div.remove();
            }
          });
        };
        removeElement();
        const observer = new MutationObserver(removeElement);
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
