<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>New Braz - TV Ao Vivo, Filmes e Séries em Streaming</title>
    <meta name="description" content="New Braz: Assista TV ao vivo, filmes, séries e futebol em qualidade 4K. Teste grátis por 7 dias. Planos a partir de R$30/mês." />
    <meta name="keywords" content="New Braz, streaming, TV ao vivo, filmes, séries, futebol, streaming Brasil, app streaming" />
    <meta property="og:title" content="New Braz - TV Ao Vivo, Filmes e Séries em Streaming" />
    <meta property="og:description" content="New Braz: Assista TV ao vivo, filmes, séries e futebol em qualidade 4K. Teste grátis por 7 dias!" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function() {
        const removeElement = () => {
          const divs = document.querySelectorAll('div');
          divs.forEach(div => {
            if (div.textContent && div.textContent.includes('Made with Manus')) {
              div.remove();
            }
          });
        };
        removeElement();
        const observer = new MutationObserver(removeElement);
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
